<!DOCTYPE html>
<html>
<head>
  <title>Login - SkillSwap</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <style>
    body{
      margin:0;
      background:#020617;
      font-family:Arial;
      display:flex;
      justify-content:center;
      align-items:center;
      height:100vh;
      color:white;
    }

    .card{
      width:90%;
      max-width:380px;
      background:#1e293b;
      padding:25px;
      border-radius:20px;
      text-align:center;
    }

    input{
      width:100%;
      padding:12px;
      margin-top:10px;
      border-radius:10px;
      border:none;
      background:#020617;
      color:white;
    }

    button{
      width:100%;
      padding:12px;
      margin-top:15px;
      border-radius:10px;
      border:none;
      background:linear-gradient(45deg,#22c55e,#38bdf8);
      color:white;
      font-weight:bold;
      cursor:pointer;
    }

    .link{
      margin-top:10px;
      color:#aaa;
      cursor:pointer;
    }
  </style>
</head>

<body>

<div class="card">
  <h2>Login</h2>

  <input id="email" placeholder="Email">
  <input id="password" type="password" placeholder="Password">

  <button onclick="login()">Login</button>

  <div class="link" onclick="goSignup()">
    Create Account
  </div>
</div>

<script>

function goSignup(){
  window.location.href = "signup.html"
}

async function login(){

  const email = document.getElementById("email").value
  const password = document.getElementById("password").value

  const { error } = await supabaseClient.auth.signInWithPassword({
    email,
    password
  })

  if(error){
    alert(error.message)
    return
  }

  window.location.href = "dashboard.html"
}
</script>
    <script src="supabase.js"></script>
</body>
</html>
